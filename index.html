<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Application</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Welcome Screen -->
        <div id="welcomeScreen" class="screen active">
            <div class="welcome-content">
                <h1>Welcome to Quiz Master</h1>
                <p>Test your knowledge with our interactive quiz!</p>
                <div class="quiz-info">
                    <p id="totalQuestions"></p>
                    <p id="totalDifficulty"></p>
                </div>
                <button class="btn btn-primary" onclick="startQuiz()">Start Quiz</button>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quizScreen" class="screen">
            <div class="quiz-header">
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="quiz-info-bar">
                    <span id="questionNumber">Question 1 of 10</span>
                    <span id="timer" class="timer">30s</span>
                </div>
            </div>

            <div class="quiz-content">
                <h2 id="questionText">Question will appear here</h2>
                <div id="optionsContainer" class="options-container"></div>
            </div>

            <div class="quiz-footer">
                <button class="btn btn-secondary" onclick="previousQuestion()" id="prevBtn" disabled>Previous</button>
                <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">Next</button>
            </div>
        </div>

        <!-- Results Screen -->
        <div id="resultsScreen" class="screen">
            <div class="results-content">
                <h1>Quiz Complete!</h1>
                <div class="score-circle">
                    <div class="score-text">
                        <span id="finalScore">0</span>
                        <span class="score-label">/ 10</span>
                    </div>
                </div>
                <p id="scoreMessage"></p>
                <div class="results-summary" id="resultsSummary"></div>
                <div class="button-group">
                    <button class="btn btn-secondary" onclick="reviewAnswers()">Review Answers</button>
                    <button class="btn btn-primary" onclick="restartQuiz()">Restart Quiz</button>
                </div>
            </div>
        </div>

        <!-- Review Screen -->
        <div id="reviewScreen" class="screen">
            <div class="review-header">
                <h2>Review Your Answers</h2>
                <button class="btn btn-secondary" onclick="backToResults()">Back to Results</button>
            </div>
            <div id="reviewContainer" class="review-container"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
